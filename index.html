<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salary Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #022c22 100%);
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      color: #e2e8f0;
    }

    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    input[type=number] {
      -moz-appearance: textfield;
    }
  </style>
</head>

<body class="py-10 px-4 md:px-0">
  <div class="max-w-4xl mx-auto">

    <!-- Header -->
    <div class="text-center mb-10">
      <h1 class="text-4xl md:text-5xl font-black text-white tracking-tight mb-2">SALARY MANAGER</h1>
      <p class="text-slate-400 font-medium">Employee Salary Management System</p>
    </div>

    <!-- Add New Employee Section -->
    <div
      class="bg-slate-800/50 backdrop-blur-md rounded-3xl shadow-2xl p-6 md:p-8 mb-8 border border-slate-700">
      <h2 class="text-blue-400 font-bold text-lg mb-6 flex items-center gap-2">
        <i class="fas fa-plus"></i> Add New Employee
      </h2>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-6">
        <!-- Full Name -->
        <div>
          <label class="block text-xs font-bold text-slate-400 mb-1.5" for="fullName">Full Name</label>
          <input type="text" id="fullName" placeholder="e.g. John Doe"
            class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-2.5 text-sm text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all placeholder:text-slate-600">
        </div>

        <!-- Department -->
        <div>
          <label class="block text-xs font-bold text-slate-400 mb-1.5" for="department">Department</label>
          <input type="text" id="department" placeholder="e.g. Engineering"
            class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-2.5 text-sm text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all placeholder:text-slate-600">
        </div>

        <!-- Base Salary -->
        <div>
          <label class="block text-xs font-bold text-slate-400 mb-1.5" for="baseSalary">Base Salary ($)</label>
          <div class="relative">
            <input type="number" id="baseSalary" placeholder="e.g. 5000"
              class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-2.5 text-sm text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all placeholder:text-slate-600 pr-10">
            <div
              class="absolute inset-y-0 right-0 flex flex-col justify-center px-3 text-slate-500 pointer-events-none items-center space-y-0.5 pt-2">
              <i class="fas fa-caret-up text-[10px] block leading-none cursor-pointer"></i>
              <i class="fas fa-caret-down text-[10px] block leading-none cursor-pointer"></i>
            </div>
          </div>
        </div>

        <!-- Bonus -->
        <div>
          <label class="block text-xs font-bold text-slate-400 mb-1.5" for="bonus">Bonus</label>
          <div class="relative">
            <input type="number" id="bonus" placeholder="0" value="0"
              class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-2.5 text-sm text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all placeholder:text-slate-600 pr-10">
            <div
              class="absolute inset-y-0 right-0 flex flex-col justify-center px-3 text-slate-500 pointer-events-none items-center space-y-0.5 pt-2">
              <i class="fas fa-caret-up text-[10px] block leading-none"></i>
              <i class="fas fa-caret-down text-[10px] block leading-none"></i>
            </div>
          </div>
        </div>

        <!-- Allowances -->
        <div>
          <label class="block text-xs font-bold text-slate-400 mb-1.5" for="allowances">Allowances</label>
          <div class="relative">
            <input type="number" id="allowances" placeholder="0" value="0"
              class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-2.5 text-sm text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all placeholder:text-slate-600 pr-10">
            <div
              class="absolute inset-y-0 right-0 flex flex-col justify-center px-3 text-slate-500 pointer-events-none items-center space-y-0.5 pt-2">
              <i class="fas fa-caret-up text-[10px] block leading-none"></i>
              <i class="fas fa-caret-down text-[10px] block leading-none"></i>
            </div>
          </div>
        </div>

        <!-- Deductions -->
        <div>
          <label class="block text-xs font-bold text-slate-400 mb-1.5" for="deductions">Deductions</label>
          <div class="relative">
            <input type="number" id="deductions" placeholder="0" value="0"
              class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-2.5 text-sm text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all placeholder:text-slate-600 pr-10">
            <div
              class="absolute inset-y-0 right-0 flex flex-col justify-center px-3 text-slate-500 pointer-events-none items-center space-y-0.5 pt-2">
              <i class="fas fa-caret-up text-[10px] block leading-none"></i>
              <i class="fas fa-caret-down text-[10px] block leading-none"></i>
            </div>
          </div>
        </div>
      </div>

      <!-- Net Salary Output Box -->
      <div class="bg-blue-900/20 border border-blue-800/50 rounded-2xl p-5 flex justify-between items-center mb-6">
        <span class="text-slate-400 font-semibold text-sm">Net Salary:</span>
        <span class="text-blue-400 font-black text-3xl" id="netSalaryDisplay">$0</span>
      </div>

      <!-- Action Buttons -->
      <div class="flex flex-col sm:flex-row gap-3">
        <button id="calculateBtn"
          class="bg-emerald-600 hover:bg-emerald-500 text-white px-5 py-3 rounded-xl font-semibold text-sm transition-colors flex items-center justify-center gap-2 shadow-sm shadow-emerald-900/50 border border-emerald-500/30">
          <i class="fas fa-calculator text-xs"></i> Calculate Net Salary
        </button>
        <button id="addEmployeeBtn"
          class="bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-3 rounded-xl font-semibold text-sm transition-colors flex-1 flex items-center justify-center gap-2 shadow-sm shadow-indigo-900/50 border border-indigo-500/30">
          <i class="fas fa-user-plus text-xs"></i> Add Employee
        </button>
      </div>
    </div>

    <!-- Search Employees Section -->
    <div
      class="bg-slate-800/50 backdrop-blur-md rounded-3xl shadow-2xl p-6 md:p-8 mb-8 border border-slate-700">
      <h2 class="text-blue-400 font-bold text-lg mb-6 flex items-center gap-2">
        <i class="fas fa-search"></i> Search Employees
      </h2>

      <input type="text" id="searchInput" placeholder="Search for employees..."
        class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-sm text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all placeholder:text-slate-600 mb-4">

      <div class="flex flex-col sm:flex-row gap-3">
        <button id="searchNameBtn"
          class="bg-slate-800 hover:bg-slate-700 text-indigo-400 border border-slate-600 px-4 py-3 rounded-xl font-semibold text-sm transition-colors flex-1 shadow-sm">
          Search by Name
        </button>
        <button id="searchDeptBtn"
          class="bg-slate-800 hover:bg-slate-700 text-indigo-400 border border-slate-600 px-4 py-3 rounded-xl font-semibold text-sm transition-colors flex-1 shadow-sm">
          Search by Dept
        </button>
        <button id="clearSearchBtn"
          class="bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-600 px-4 py-3 rounded-xl font-semibold text-sm transition-colors flex-1 shadow-sm">
          Clear Search
        </button>
      </div>
    </div>

    <!-- Employee List Section -->
    <div
      class="bg-slate-800/50 backdrop-blur-md rounded-3xl shadow-2xl border border-slate-700 overflow-hidden">
      <!-- List Header -->
      <div class="p-6 md:px-8 md:py-5 border-b border-slate-700 flex justify-between items-center bg-slate-800/80">
        <h2 class="text-blue-400 font-bold text-lg">Employee List</h2>
        <button id="deleteAllBtn"
          class="bg-red-900/30 hover:bg-red-900/50 text-red-400 px-3 py-1.5 rounded-lg font-semibold text-xs border border-red-800/50 transition-colors flex items-center gap-1.5">
          <i class="fas fa-trash-alt"></i> Delete All
        </button>
      </div>

      <!-- List Body -->
      <div class="p-6 md:p-8 min-h-[200px] flex items-center justify-center bg-slate-900/30" id="employeeListContainer">
        <!-- Empty State -->
        <p class="text-slate-500 font-medium text-sm" id="emptyStateText">No employee data</p>

        <!-- List will be populated here -->
        <div id="employeeList" class="w-full flex-col gap-3 hidden"></div>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>

</html>
